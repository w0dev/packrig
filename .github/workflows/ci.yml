name: CI

on:
  push:
    branches: [ main, unstable, readiness ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "cmake;4.1.2"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Golden trace replay
        run: gradle :app:testDebugUnitTest --tests "net.packrig.app.foundations.golden.GoldenTraceTest" --no-daemon --stacktrace

      - name: Unit tests
        run: gradle testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 14

  debug-apk:
    name: Debug APK
    needs: test
    if: github.ref != 'refs/heads/unstable'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "cmake;4.1.2"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Assemble debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: packrig-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  unstable-apk:
    name: Unstable APK
    needs: test
    if: github.ref == 'refs/heads/unstable'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "cmake;4.1.2"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Prepare release keystore
        id: keystore
        env:
          PACKRIG_KEYSTORE_BASE64: ${{ secrets.PACKSET_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$PACKRIG_KEYSTORE_BASE64" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No PACKRIG_KEYSTORE_BASE64 secret; building unsigned release APK."
            exit 0
          fi
          echo "$PACKRIG_KEYSTORE_BASE64" | base64 -d > "${GITHUB_WORKSPACE}/release.keystore"
          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "path=${GITHUB_WORKSPACE}/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Set unstable version suffix
        run: echo "PACKRIG_VERSION_NAME_SUFFIX=-unstable+${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Assemble unstable release APK
        env:
          PACKRIG_UNSTABLE: true
          PACKRIG_VERSION_CODE: ${{ github.run_number }}
          PACKRIG_KEYSTORE: ${{ steps.keystore.outputs.path }}
          PACKRIG_KEYSTORE_PASSWORD: ${{ secrets.PACKSET_KEYSTORE_PASSWORD }}
          PACKRIG_KEY_ALIAS: ${{ secrets.PACKSET_KEY_ALIAS }}
          PACKRIG_KEY_PASSWORD: ${{ secrets.PACKSET_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload unstable APK
        uses: actions/upload-artifact@v7
        with:
          name: packrig-unstable-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
