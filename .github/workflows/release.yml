name: Stable Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Stable release tags (v*) must point to a commit on main."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "cmake;4.1.2"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Unit tests
        run: gradle testDebugUnitTest --no-daemon --stacktrace

      - name: Require release signing secrets
        env:
          FT8VC_KEYSTORE_BASE64: ${{ secrets.FT8VC_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$FT8VC_KEYSTORE_BASE64" ]; then
            echo "::error::Stable releases require FT8VC_KEYSTORE_BASE64 and related repository secrets."
            exit 1
          fi

      - name: Decode release keystore
        env:
          FT8VC_KEYSTORE_BASE64: ${{ secrets.FT8VC_KEYSTORE_BASE64 }}
        run: echo "$FT8VC_KEYSTORE_BASE64" | base64 -d > "${GITHUB_WORKSPACE}/release.keystore"

      - name: Assemble release APK
        env:
          FT8VC_KEYSTORE: ${{ github.workspace }}/release.keystore
          FT8VC_KEYSTORE_PASSWORD: ${{ secrets.FT8VC_KEYSTORE_PASSWORD }}
          FT8VC_KEY_ALIAS: ${{ secrets.FT8VC_KEY_ALIAS }}
          FT8VC_KEY_PASSWORD: ${{ secrets.FT8VC_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          draft: true
