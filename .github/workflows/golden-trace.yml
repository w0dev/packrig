name: Golden Trace

on:
  push:
    branches:
      - unstable
      - main
      - readiness
  pull_request:
    branches:
      - unstable
      - main

jobs:
  golden-trace:
    name: Replay golden trace via GoldenTraceTest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run GoldenTraceTest
        run: ./gradlew :app:testDebugUnitTest --tests "net.packset.app.foundations.golden.GoldenTraceTest" --no-daemon --stacktrace

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-trace-report
          path: app/build/reports/tests/
          retention-days: 14
